name: Flutter CI

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:
    branches:
      - main
      - master
      - develop

jobs:
  quality-check:
    name: Analyze, Test, and Privacy Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Show Flutter version
        run: flutter --version

      - name: Install dependencies
        run: flutter pub get

      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze project
        run: flutter analyze

      - name: Run tests
        run: flutter test

      - name: Install ripgrep
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - name: Check for raw print/debug/log usage
        run: |
          if rg "print\(|debugPrint\(|log\(" lib test; then
            echo "Raw print/debugPrint/log usage found. Please remove it."
            exit 1
          else
            echo "No raw print/debugPrint/log usage found."
          fi

      - name: Review sensitive keyword matches
        run: |
          echo "Running sensitive keyword review..."
          rg -i "secret|token|password|email|phone|authorization" lib test || true

          echo ""
          echo "Expected intentional matches may include:"
          echo "- storage policy blocked keywords"
          echo "- fake session token fields"
          echo "- fake fixture data"
          echo "- privacy and redaction tests"
          echo ""
          echo "Please confirm there are no real credentials, real API keys, DSNs, real authorization headers, request bodies, or response bodies."

      - name: Build debug APK
        run: flutter build apk --debug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk